name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Build
        run: |
          xcodebuild build \
            -project PathFatter.xcodeproj \
            -scheme PathFatter \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true

      - name: Run Tests
        run: |
          xcodebuild test \
            -project PathFatter.xcodeproj \
            -scheme PathFatter \
            -destination 'platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty || true